                        <label>Città d'Imbarco</label>
                        <input type="text" id="citta_imbarco" required="" placeholder="Es: NAPOLI">
                    </div>
                    <div class="form-group">
                        <label>Data di Sbarco</label>
                        <input type="date" id="data_sbarco" required="">
                    </div>
                    <div class="form-group">
                        <label>Città di Sbarco</label>
                        <input type="text" id="citta_sbarco" required="" placeholder="Es: NAPOLI">
                    </div>
                    <div class="form-group">
                        <label>Giorni Lavorati (Auto-calcolati se vuoto)</label>
                        <input type="number" id="giorni" placeholder="Es: 64">
                    </div>
                    <div class="form-group">
                        <label>Motivo dello Sbarco</label>
                        <select id="motivo" required="">
                            <option value="FERIE/RIPOSI">Ferie/Riposi</option>
                            <option value="CAMBIO RUOLO">Cambio Ruolo</option>
                            <option value="MALATTIA">Malattia</option>
                            <option value="TRASBORDO">Trasbordo</option>
                            <option value="ALTRO">Altro</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label>Note aggiuntive (Opzionale)</label>
                    <textarea id="note" rows="2" placeholder="Eventuali annotazioni..."></textarea>
                </div>
                
                <div class="buttons-group">
                    <button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Salva Imbarco</button>
                    <button type="button" class="btn-cancel" id="cancelEditBtn" onclick="annullaModifica()"><i class="fa-solid fa-xmark"></i> Annulla Modifica</button>
                </div>
            </form>
        </section>

        <!-- Tab Statistiche -->
        <section id="statistiche" class="tab-content">
            <div class="stats-grid">
                <div class="glass-panel stat-card">
                    <p>Totale Imbarchi</p>
                    <h3 id="totImbarchi">1</h3>
                </div>
                <div class="glass-panel stat-card">
                    <p>Totale Giorni a Bordo</p>
                    <h3 id="totGiorni">25</h3>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="glass-panel chart-container" style="flex: 2;">
                    <canvas id="naveChart" height="0" style="display: block; box-sizing: border-box; height: 0px; width: 0px;" width="0"></canvas>
                </div>
                <div class="glass-panel chart-container" style="flex: 1;">
                    <canvas id="motivoChart" height="0" style="display: block; box-sizing: border-box; height: 0px; width: 0px;" width="0"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURAZIONE ENDPOINT GOOGLE
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyFdSdV1mPM41T9MtmLuQ2QsNGQND1FNjI185_2NTgtAF5rfzYdXXrsu1Eo-7OOPvAh2w/exec';
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1ae5P-gO6j474lzN74K6dxGY69nU377gb3hOWrLBdOIY/export?format=csv';

        let appData = [];
        let isEditingId = null; 
        let chart1, chart2;

        window.onload = () => {
            loadDatiDaGoogle();
        };

        // --- LETTURA DAL FOGLIO GOOGLE ---
        async function loadDatiDaGoogle() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const url = GOOGLE_SHEET_CSV_URL + '&gid=0&_t=' + Date.now();
                const response = await fetch(url);
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                appData = [];
                
                for(let i=1; i < rows.length; i++) {
                    if(!rows[i][0]) continue; 
                    
                    appData.push({
                        id: rows[i][0].toString(),
                        nome: rows[i][1],
                        data_imbarco: parseDateToInputFormat(rows[i][2]),
                        nave: rows[i][3],
                        citta_imbarco: rows[i][4],
                        data_sbarco: parseDateToInputFormat(rows[i][5]),
                        citta_sbarco: rows[i][6],
                        giorni: parseInt(rows[i][7]) || 0,
                        motivo: rows[i][8],
                        note: rows[i][9] || ""
                    });
                }
                
                appData.sort((a, b) => new Date(b.data_imbarco) - new Date(a.data_imbarco));
                
                renderTable();
                updateStats();
            } catch(e) {
                console.error("Errore importazione", e);
                alert("Impossibile connettersi al Foglio Google per scaricare i dati.");
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // --- GESTIONE INVIO DATI ---
        document.getElementById('insertForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let d_imbarco = document.getElementById('data_imbarco').value;
            let d_sbarco = document.getElementById('data_sbarco').value;
            let giorniVal = document.getElementById('giorni').value;
            if(!giorniVal) giorniVal = calcolaGiorni(d_imbarco, d_sbarco);

            const payload = {
                id: isEditingId ? isEditingId : Date.now().toString(),
                action: isEditingId ? 'update' : 'insert',
                nome: document.getElementById('nome').value,
                data_imbarco: d_imbarco,
                nave: document.getElementById('nave').value.toUpperCase().trim(),
                citta_imbarco: document.getElementById('citta_imbarco').value.toUpperCase().trim(),
                data_sbarco: d_sbarco,
                citta_sbarco: document.getElementById('citta_sbarco').value.toUpperCase().trim(),
                giorni: parseInt(giorniVal),
                motivo: document.getElementById('motivo').value,
                note: document.getElementById('note').value
            };

            document.getElementById('loadingOverlay').style.display = 'flex';
            document.querySelector('#loadingOverlay p').innerText = "Salvataggio su Google Sheets in corso...";

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                await new Promise(r => setTimeout(r, 2000)); 
                await loadDatiDaGoogle();
                
                annullaModifica(); 
                showTab('lista');
                
            } catch (e) {
                console.error(e);
                alert("Errore durante il salvataggio.");
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        });

        // --- PREPARA FORM ---
        function attivaModifica(id) {
            const record = appData.find(r => r.id === id.toString());
            if(!record) return;
            
            isEditingId = record.id;
            document.getElementById('nome').value = record.nome;
            document.getElementById('data_imbarco').value = record.data_imbarco;
            document.getElementById('nave').value = record.nave;
            document.getElementById('citta_imbarco').value = record.citta_imbarco;
            document.getElementById('data_sbarco').value = record.data_sbarco;
            document.getElementById('citta_sbarco').value = record.citta_sbarco;
            document.getElementById('giorni').value = record.giorni;
            document.getElementById('motivo').value = record.motivo;
            document.getElementById('note').value = record.note;
            
            document.getElementById('formTitle').innerText = "Modifica Imbarco Esistente";
            document.querySelector('.btn-submit').innerHTML = '<i class="fa-solid fa-pen"></i> Aggiorna su Google Sheet';
            document.getElementById('cancelEditBtn').style.display = 'flex';
            
            showTab('inserisci');
        }

        // --- ELIMINAZIONE RECORD CLOUD ---
        async function eliminaRecord(id) {
            if(!confirm("Sei sicuro di voler eliminare DEFINITIVAMENTE questo imbarco dal foglio Google?")) return;
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.querySelector('#loadingOverlay p').innerText = "Eliminazione da Google Sheets in corso...";
            
            const payload = { action: 'delete', id: id.toString() };
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                await new Promise(r => setTimeout(r, 2000));
                await loadDatiDaGoogle();
            } catch (e) {
                console.error(e);
                alert("Errore durante l'eliminazione.");
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // --- UTILS ---
        function annullaModifica() {
            document.getElementById('insertForm').reset();
            document.getElementById('nome').value = "Antonio Novembrini";
            isEditingId = null;
            document.getElementById('formTitle').innerText = "Registra Nuovo Imbarco";
            document.querySelector('.btn-submit').innerHTML = '<i class="fa-solid fa-save"></i> Salva Imbarco';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            const buttons = document.querySelectorAll('nav button');
            if(tabId === 'lista') buttons[0].classList.add('active');
            if(tabId === 'inserisci') buttons[1].classList.add('active');
            if(tabId === 'statistiche') buttons[2].classList.add('active');

            if(tabId === 'statistiche') updateStats();
        }

        function calcolaGiorni(start, end) {
            const date1 = new Date(start);
            const date2 = new Date(end);
            return Math.ceil(Math.abs(date2 - date1) / (1000 * 60 * 60 * 24)); 
        }

        function parseDateToInputFormat(dateStr) {
            if(!dateStr) return "";
            if (dateStr.includes('-') && dateStr.split('-')[0].length === 4) return dateStr; 
            if (dateStr.includes('/')) {
                const p = dateStr.split('/');
                if(p.length === 3) return `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
            }
            return dateStr;
        }

        function formatDataDisplay(dataStr) {
            if(!dataStr) return "";
            const parti = dataStr.split('-');
            if(parti.length === 3) return `${parti[2]}/${parti[1]}/${parti[0]}`;
            return dataStr;
        }

        function parseCSV(str) {
            const arr = []; let quote = false; let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function getBadgeClass(motivo) {
            const m = motivo.toUpperCase();
            if(m.includes('FERIE')) return 'badge-ferie';
            if(m.includes('MALATTIA')) return 'badge-malattia';
            if(m.includes('TRASBORDO')) return 'badge-trasbordo';
            if(m.includes('CAMBIO')) return 'badge-cambio';
            return '';
        }

        // --- RENDERING TABELLA ---
        function renderTable() {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            
            if(appData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;">Nessun imbarco trovato nel foglio Google.</td></tr>`;
                return;
            }

            appData.forEach(row => {
                tbody.innerHTML += `
                    <tr>
                        <td>${formatDataDisplay(row.data_imbarco)}</td>
                        <td><strong>${row.nave}</strong><br><small style="color:#aaa">${row.citta_imbarco}</small></td>
                        <td></td>
                        <td>${formatDataDisplay(row.data_sbarco)}</td>
                        <td><small style="color:#aaa">${row.citta_sbarco}</small></td>
                        <td><strong style="color: #4facfe; font-size:1.1rem;">${row.giorni}</strong></td>
                        <td><span class="badge ${getBadgeClass(row.motivo)}">${row.motivo}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="edit-btn" onclick="attivaModifica('${row.id}')" title="Modifica Record"><i class="fa-solid fa-pen"></i></button>
                                <button class="delete-btn" onclick="eliminaRecord('${row.id}')" title="Elimina Definitivamente"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(r => { r.children[2].style.display = 'none'; r.children[4].style.display = 'none'; });
            document.querySelector('#dataTable thead tr').children[2].style.display = 'none';
            document.querySelector('#dataTable thead tr').children[4].style.display = 'none';
        }

        // --- STATISTICHE ---
        function updateStats() {
            document.getElementById('totImbarchi').innerText = appData.length;
            const totGiorni = appData.reduce((acc, curr) => acc + curr.giorni, 0);
            document.getElementById('totGiorni').innerText = totGiorni;

            const naviStats = {}; const motiviStats = {};
            appData.forEach(r => {
                naviStats[r.nave] = (naviStats[r.nave] || 0) + r.giorni;
                motiviStats[r.motivo] = (motiviStats[r.motivo] || 0) + 1;
            });

            Chart.defaults.color = 'rgba(255, 255, 255, 0.8)';
            Chart.defaults.font.family = "'Poppins', sans-serif";
            
            if(chart1) chart1.destroy();
            const ctx1 = document.getElementById('naveChart').getContext('2d');
            chart1 = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: Object.keys(naviStats),
                    datasets: [{ label: 'Giorni totali a bordo', data: Object.values(naviStats), backgroundColor: 'rgba(79, 172, 254, 0.7)', borderColor: '#4facfe', borderWidth: 1, borderRadius: 6 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, title: { display: true, text: 'GIORNI LAVORATI PER NAVE', font: { size: 16 } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' } }, x: { grid: { display: false } } } }
            });

            if(chart2) chart2.destroy();
            const ctx2 = document.getElementById('motivoChart').getContext('2d');
            chart2 = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(motiviStats),
                    datasets: [{ data: Object.values(motiviStats), backgroundColor: ['rgba(79, 172, 254, 0.7)', 'rgba(255, 107, 107, 0.7)', 'rgba(29, 209, 161, 0.7)', 'rgba(254, 202, 87, 0.7)'], borderColor: 'rgba(255, 255, 255, 0.1)', borderWidth: 2 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' }, title: { display: true, text: 'MOTIVAZIONI SBARCO', font: { size: 16 } } } }
            });
        }
    </script>

</body></html>
